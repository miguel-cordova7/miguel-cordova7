name: Actualizar Tarjeta de Rachas (Motor Original)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # Extensiones críticas para el código original
          extensions: curl, json, intl 

      - name: Ejecutar motor oficial
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: php generar_racha.php

      - name: Guardar racha.svg
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add racha.svg
          git commit -m "Sincronización racha (Motor Original DenverCoder1)" || exit 0
          git push
